<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UCH Demo — Interactive Environment</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0f1e;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
    #app{max-width:1100px;margin:0 auto;padding:24px}

    /* Header */
    .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .hdr-logo{display:flex;align-items:center;gap:12px}
    .logo-icon{width:40px;height:40px;border-radius:12px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);display:flex;align-items:center;justify-content:center;font-size:20px}
    .hdr-title{font-size:17px;font-weight:600}
    .hdr-sub{font-size:11px;color:#64748b;margin-top:2px}
    .hdr-actions{display:flex;align-items:center;gap:8px}
    .user-label{font-size:11px;color:#64748b}

    /* Buttons */
    .btn{padding:8px 14px;border-radius:10px;border:1px solid;cursor:pointer;font-size:13px;background:transparent;color:#e2e8f0}
    .btn-ghost{border-color:#334155;background:#0f172a}
    .btn-ghost:hover{background:#1e293b}
    .btn-red{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.08);color:#fca5a5}
    .btn-red:hover{background:rgba(239,68,68,.15)}
    .btn-green{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.08);color:#6ee7b7}
    .btn-green:hover{background:rgba(16,185,129,.15)}
    .btn-indigo{border-color:rgba(99,102,241,.35);background:rgba(99,102,241,.1);color:#a5b4fc}
    .btn-indigo:hover{background:rgba(99,102,241,.2)}
    .btn-amber{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.08);color:#fcd34d}
    .btn-amber:hover{background:rgba(245,158,11,.15)}

    /* Nav */
    nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
    nav button{padding:8px 16px;border-radius:10px;border:1px solid #1e293b;background:#0f172a;color:#94a3b8;cursor:pointer;font-size:13px}
    nav button:hover{background:#1e293b}
    nav button.active{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.35);color:#a5b4fc}

    /* Cards */
    .card{background:#0f172a;border:1px solid #1e293b;border-radius:16px;padding:20px}
    .grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
    .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;margin-top:12px}
    .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
    .kpi-label{font-size:11px;color:#64748b}
    .kpi-val{font-size:28px;font-weight:700;margin-top:4px}
    .kpi-hint{font-size:11px;color:#475569;margin-top:4px}
    .section-title{font-size:15px;font-weight:600;margin-bottom:12px}
    .row-actions{display:flex;gap:6px;margin-top:8px}

    /* Table */
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:8px 10px 8px 0;font-size:11px;color:#64748b;font-weight:500}
    td{padding:10px 10px 10px 0;border-top:1px solid #1e293b;color:#cbd5e1}
    .tbl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}

    /* Badges */
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:8px;border:1px solid;font-size:11px;font-weight:500}
    .b-red{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#fca5a5}
    .b-amber{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:#fcd34d}
    .b-green{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:#6ee7b7}
    .b-indigo{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3);color:#a5b4fc}
    .b-slate{background:#1e293b;border-color:#334155;color:#cbd5e1}

    /* Login */
    .login-wrap{max-width:420px;margin:60px auto}
    .cred-box{background:#0a0f1e;border:1px solid #1e293b;border-radius:12px;padding:12px;font-size:12px;color:#94a3b8;margin:12px 0}
    label{font-size:12px;color:#64748b;display:block;margin-bottom:4px;margin-top:12px}
    input[type=text],input[type=password],textarea{width:100%;padding:10px 12px;border-radius:10px;background:#0a0f1e;border:1px solid #1e293b;color:#e2e8f0;font-size:13px;outline:none;font-family:inherit}
    input:focus,textarea:focus{border-color:rgba(99,102,241,.5)}
    textarea{resize:vertical;min-height:120px}

    /* Telemed */
    .tele-box{background:#0a0f1e;border:1px solid #1e293b;border-radius:12px;padding:16px;font-size:12px;color:#64748b;margin-top:12px;min-height:80px}
    .tele-live{color:#6ee7b7}

    ul.feat-list{list-style:disc;padding-left:18px;color:#94a3b8;font-size:13px;line-height:2}
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="./demo-data.js"></script>
  <script src="./demo.js"></script>
</body>
</html>
