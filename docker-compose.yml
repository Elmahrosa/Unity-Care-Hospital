version: '3.9'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uch-api
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - uch-network
    volumes:
      - api-logs:/app/logs

  mongo:
    image: mongo:7
    container_name: uch-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: unity_care_hospital
    volumes:
      - mongo-data:/data/db
    networks:
      - uch-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Static website (institutional landing page)
  website:
    image: nginx:alpine
    container_name: uch-website
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./website:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - uch-network

networks:
  uch-network:
    driver: bridge

volumes:
  mongo-data:
  api-logs: